<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Awards Management</title>
    <link
      rel="stylesheet"
      th:href="@{/bootstrap-4.5.3-dist/css/bootstrap.min.css}"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <a class="navbar-brand" href="/">SEAL Portal</a>
      <div class="navbar-nav">
        <a class="nav-item nav-link" href="/">Home</a>
        <a class="nav-item nav-link active" href="/awards">Awards Management</a>
        <a class="nav-item nav-link" href="/reports">Reports Management</a>
      </div>
    </nav>

    <div class="container">
      <div class="card mb-4">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h4 class="mb-0">Awards List</h4>
          <a href="/awards/new" class="btn btn-sm btn-primary"
            >New Award Assignment</a
          >
        </div>
        <div class="card-body">
          <table class="table table-bordered table-striped">
            <thead class="thead-dark">
              <tr>
                <th>Award Title</th>
                <th>Event</th>
                <th>Winning Team</th>
                <th>Announced At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="award : ${awards}">
                <td th:text="${award.title}">Title</td>
                <td th:text="${award.event.name}">Event</td>
                <td th:text="${award.team.name}">Team</td>
                <td th:text="${award.announcedAt}">Date</td>
                <td>
                  <a
                    th:href="@{/awards/edit/{id}(id=${award.id})}"
                    class="btn btn-sm btn-warning"
                    >Edit</a
                  >
                  <a
                    th:href="@{/awards/delete/{id}(id=${award.id})}"
                    class="btn btn-sm btn-danger"
                    onclick="return confirm('Delete this award assignment?');"
                    >Delete</a
                  >
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(awards)}">
                <td colspan="5" class="text-center text-muted">
                  No award entries found in system.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
