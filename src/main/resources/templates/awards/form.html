<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Award Form</title>
    <link
      rel="stylesheet"
      th:href="@{/bootstrap-4.5.3-dist/css/bootstrap.min.css}"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <a class="navbar-brand" href="/">SEAL Portal</a>
      <div class="navbar-nav">
        <a class="nav-item nav-link" href="/">Home</a>
        <a class="nav-item nav-link active" href="/awards">Awards Management</a>
        <a class="nav-item nav-link" href="/reports">Reports Management</a>
      </div>
    </nav>

    <div class="container">
      <div class="card mx-auto" style="max-width: 600px">
        <div class="card-header">
          <h5
            class="mb-0"
            th:text="${award.id == null ? 'Assign New Award' : 'Edit Award Assignment'}"
          >
            Award Form
          </h5>
        </div>
        <div class="card-body">
          <form th:action="@{/awards/save}" th:object="${award}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="form-group">
              <label for="event">Event</label>
              <select class="form-control" th:field="*{event.id}" required>
                <option value="">-- Choose Event --</option>
                <option
                  th:each="evt : ${events}"
                  th:value="${evt.id}"
                  th:text="${evt.name}"
                ></option>
              </select>
            </div>

            <div class="form-group">
              <label for="team">Winning Team</label>
              <select class="form-control" th:field="*{team.id}" required>
                <option value="">-- Choose Winning Team --</option>
                <option
                  th:each="t : ${teams}"
                  th:value="${t.id}"
                  th:text="${t.name}"
                ></option>
              </select>
            </div>

            <div class="form-group">
              <label for="title">Award Title</label>
              <input
                type="text"
                class="form-control"
                th:field="*{title}"
                placeholder="e.g. Champion, Best Pitch"
                required
              />
            </div>

            <div class="form-group">
              <label for="description">Description</label>
              <textarea
                class="form-control"
                th:field="*{description}"
                rows="3"
                placeholder="Enter details about this recognition"
              ></textarea>
            </div>

            <div class="d-flex justify-content-between">
              <a href="/awards" class="btn btn-secondary">Cancel</a>
              <button type="submit" class="btn btn-success">Save</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
