<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Report Management</title>
    <link
      rel="stylesheet"
      th:href="@{/bootstrap-4.5.3-dist/css/bootstrap.min.css}"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <a class="navbar-brand" href="/">SEAL Portal</a>
      <div class="navbar-nav">
        <a class="nav-item nav-link" href="/">Home</a>
        <a class="nav-item nav-link" href="/awards">Awards Management</a>
        <a class="nav-item nav-link active" href="/reports"
          >Reports Management</a
        >
      </div>
    </nav>

    <div class="container">
      <!-- Generate Panel -->
      <div class="card mb-4">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Generate Event Report</h5>
        </div>
        <div class="card-body">
          <form
            th:action="@{/reports/generate}"
            method="post"
            class="form-inline"
          >
            <div class="form-group mr-3">
              <label for="eventId" class="mr-2">Select Event:</label>
              <select class="form-control" name="eventId" required>
                <option value="">-- Choose Event --</option>
                <option
                  th:each="evt : ${events}"
                  th:value="${evt.id}"
                  th:text="${evt.name}"
                ></option>
              </select>
            </div>
            <div class="form-group mr-3">
              <label for="reportType" class="mr-2">Format:</label>
              <select class="form-control" name="reportType" required>
                <option value="analytics">Analytics Summary (JSON)</option>
                <option value="csv">CSV Export</option>
                <option value="excel">Excel Export</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">
              Compile Report
            </button>
          </form>
        </div>
      </div>

      <!-- Reports List -->
      <div class="card">
        <div class="card-header bg-dark text-white">
          <h5 class="mb-0">Generated Reports Archive</h5>
        </div>
        <div class="card-body">
          <table class="table table-bordered table-striped">
            <thead>
              <tr>
                <th>Generated Date</th>
                <th>Target Event</th>
                <th>Compiled By</th>
                <th>Format</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="report : ${reports}">
                <td th:text="${report.createdAt}">Date</td>
                <td th:text="${report.event.name}">Event</td>
                <td
                  th:text="${report.generatedBy != null ? report.generatedBy.fullName : 'System'}"
                >
                  Generator
                </td>
                <td>
                  <span
                    class="badge badge-secondary"
                    th:text="${report.reportType}"
                    >Format</span
                  >
                </td>
                <td>
                  <a
                    th:href="@{/reports/{id}(id=${report.id})}"
                    class="btn btn-sm btn-info"
                    >View Details</a
                  >
                  <a
                    th:href="@{/reports/delete/{id}(id=${report.id})}"
                    class="btn btn-sm btn-danger"
                    onclick="return confirm('Delete this archived report?');"
                    >Delete</a
                  >
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(reports)}">
                <td colspan="5" class="text-center text-muted">
                  No generated reports are archived yet.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </body>
</html>
