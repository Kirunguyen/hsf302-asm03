<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Report Detail View</title>
    <link
      rel="stylesheet"
      th:href="@{/bootstrap-4.5.3-dist/css/bootstrap.min.css}"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
      <a class="navbar-brand" href="/">SEAL Portal</a>
      <div class="navbar-nav">
        <a class="nav-item nav-link" href="/">Home</a>
        <a class="nav-item nav-link" href="/awards">Awards Management</a>
        <a class="nav-item nav-link active" href="/reports"
          >Reports Management</a
        >
      </div>
    </nav>

    <div class="container">
      <div class="card mb-4">
        <div
          class="card-header d-flex justify-content-between align-items-center"
        >
          <h4 class="mb-0">Report Details</h4>
          <a href="/reports" class="btn btn-sm btn-secondary">Back to List</a>
        </div>
        <div class="card-body">
          <div class="row mb-3">
            <div class="col-md-4">
              <strong>Target Event:</strong>
              <p th:text="${report.event.name}">Event Name</p>
            </div>
            <div class="col-md-4">
              <strong>Generated At:</strong>
              <p th:text="${report.createdAt}">Timestamp</p>
            </div>
            <div class="col-md-4">
              <strong>Format:</strong>
              <p class="text-uppercase" th:text="${report.reportType}">
                Format
              </p>
            </div>
          </div>

          <div class="form-group">
            <label class="font-weight-bold">Summary Output:</label>
            <pre
              class="bg-dark text-light p-3 rounded"
              th:text="${report.reportData}"
            >
                        No JSON metadata dump available.
                    </pre
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
